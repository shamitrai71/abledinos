[build]
  publish = "."

[[redirects]]
  from = "/login"
  to   = "/login.html"
  status = 200

[[redirects]]
  from = "/profile"
  to   = "/profile.html"
  status = 200

[[redirects]]
  from = "/alerts"
  to   = "/alerts.html"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
